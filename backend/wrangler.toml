name = "queue-tracer"
main = "worker.js"
compatibility_date = "2026-06-24"

[[containers]]
class_name = "QueueTracerContainer"
image = "./Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
name = "QUEUE_CONTAINER"
class_name = "QueueTracerContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["QueueTracerContainer"]

[vars]
ENV = "production"